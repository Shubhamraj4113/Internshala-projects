<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=location_on" />

</head>

<body class="bg-gray-900 pt-3 pb-3 text-white min-h-screen flex items-center justify-center">

<div class="w-[95%] bg-black rounded-2xl p-6 shadow-2xl">

<h1 class="text-2xl font-bold mb-4">Weather Dashboard</h1>

<!-- SEARCH -->
<div class="flex gap-2 mb-4 relative w-full">
<input id="cityInput"
class="flex-1 p-3 rounded bg-gray-800"
placeholder="Enter city name">
<ul id="suggestions"
class="absolute top-10 left-0 right-0 bg-gray-800 mt-1 rounded shadow hidden z-10">
</ul>

<button id="searchBtn"
class="bg-blue-500 px-4 py-2 rounded">
Search
</button>

<button id="locationBtn"
class="bg-green-500 px-4 py-2 rounded">
<span class="material-symbols-outlined">
location_on
</span>
</button>
</div>

<!-- RECENT SEARCH -->
<select id="recentCities"
class="bg-gray-800 p-2 rounded mb-4 hidden"></select>

<!-- ERROR -->
<div id="errorMsg"
class="text-red-400 mb-3 hidden"></div>

<!-- CURRENT WEATHER -->
<div class="grid md:grid-cols-2 gap-6">

<div class="bg-gray-800 p-5 rounded-xl">

<h2 id="cityName" class="text-xl font-semibold"></h2>
<p id="date"></p>

<div class="flex items-center gap-4 mt-3">

<img id="weatherIcon" class="w-20">

<div>
<p id="temperature" class="text-3xl"></p>
<p id="description"></p>
</div>

</div>

<div class="mt-3">
<p>Humidity: <span id="humidity"></span>%</p>
<p>Wind: <span id="wind"></span> m/s</p>
</div>

<button id="toggleTemp"
class="mt-4 bg-yellow-500 px-3 py-1 rounded">
Toggle °C/°F
</button>

</div>

<!-- HIGHLIGHTS -->

<div class="bg-gray-800 p-5 rounded-xl">

<h2 class="text-xl mb-3">Today's Highlight</h2>

<div class="grid grid-cols-2 gap-4">

<div class="bg-gray-700 p-3 rounded">
Wind
<p id="windSpeed"></p>
</div>

<div class="bg-gray-700 p-3 rounded">
Humidity
<p id="humidity2"></p>
</div>

<div class="bg-gray-700 p-3 rounded">
Visibility
<p id="visibility"></p>
</div>

<div class="bg-gray-700 p-3 rounded">
Pressure
<p id="pressure"></p>
</div>

</div>

</div>

</div>

<!-- FORECAST -->
<div class="mt-6">

<h2 class="text-xl mb-4">5 Day Forecast</h2>

<div id="forecast"
class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
