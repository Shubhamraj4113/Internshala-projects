<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Weather Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="./style.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=location_on" />

<script>
tailwind.config = {
darkMode: 'class'
}
</script>

</head>

<body id="body"
class="min-h-screen bg-gradient-to-br from-slate-900 to-black text-white transition-all duration-500">

<div class="max-w-6xl mx-auto p-6">

<!-- HEADER -->

<div class="flex justify-between items-center mb-6">

<h1 class="text-3xl font-bold">Weather Dashboard</h1>

</div>

<!-- SEARCH -->

<div class="flex gap-3 mb-4">

<input
id="cityInput"
class="flex-1 p-3 rounded-lg text-black"
placeholder="Search city">

<button
id="searchBtn"
class="bg-blue-500 px-5 py-3 rounded-lg">
Search
</button>

<button
id="locationBtn"
class="bg-green-500 px-3 py-3 rounded-lg flex">
<span class="material-symbols-outlined">
location_on
</span>
</button>

</div>

<select
id="recentCities"
class="hidden p-2 text-black rounded mb-6"></select>

<p id="errorMsg" class="text-red-400 mb-4"></p>

<!-- DASHBOARD -->

<div class="grid md:grid-cols-2 gap-6">

<!-- CURRENT WEATHER -->

<div
class="backdrop-blur-lg bg-white/10 rounded-xl p-6">

<h2 id="cityName" class="text-2xl font-bold"></h2>

<p id="date"></p>

<img id="weatherIcon" class="w-24">

<p id="temperature" class="text-4xl"></p>

<p id="description"></p>

<button
id="toggleTemp"
class="mt-3 bg-yellow-500 px-3 py-1 rounded">
Toggle °C/°F
</button>

</div>

<!-- HIGHLIGHTS -->

<div
class="backdrop-blur-lg bg-white/10 rounded-xl p-6">

<h3 class="text-xl mb-4">Today's Highlights</h3>

<div class="grid grid-cols-2 gap-4">

<div class="bg-black/30 p-4 rounded">
Wind
<p id="windSpeed"></p>
</div>

<div class="bg-black/30 p-4 rounded">
Humidity
<p id="humidity"></p>
</div>

<div class="bg-black/30 p-4 rounded">
Visibility
<p id="visibility"></p>
</div>

<div class="bg-black/30 p-4 rounded">
Pressure
<p id="pressure"></p>
</div>

</div>

</div>

</div>

<!-- FORECAST -->

<div class="mt-10">

<h2 class="text-xl mb-4">5 Day Forecast</h2>

<div
id="forecastContainer"
class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>

</div>

<!-- WEATHER EFFECTS -->

<div id="rain"
class="pointer-events-none fixed inset-0 hidden"></div>

<div id="snow"
class="pointer-events-none fixed inset-0 hidden"></div>

</div>

<script src="script.js"></script>

</body>
</html>
